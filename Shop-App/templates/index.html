{% extends 'base.html' %}
{% block content %}
<section class="rounded-2xl bg-gradient-to-r from-brandNight to-brandDeep p-10 text-white shadow-lg">
  <h1 class="text-4xl font-black">Simple Shopping Experience</h1>
  <p class="mt-3 max-w-2xl text-slate-100">
    Register your account, browse products, and place orders in a few clicks.
  </p>
  <div class="mt-6 flex flex-wrap items-center gap-4">
    <a href="{{ url_for('products') }}" class="rounded bg-brandFire px-5 py-2.5 font-semibold hover:bg-brandWine">Start Shopping</a>
    <span class="rounded bg-white/10 px-4 py-2 text-sm">Available products: {{ product_count }}</span>
  </div>
</section>
{% endblock %}
