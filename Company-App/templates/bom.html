{% extends 'base.html' %}
{% block content %}
<h1 class="mb-6 text-3xl font-black text-brandNight">Bill of Materials</h1>

<div class="grid gap-6 lg:grid-cols-3">
  <form method="post" class="space-y-3 rounded-xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
    <h2 class="text-lg font-bold text-brandDeep">Add BOM Entry</h2>
    <select name="product_id" required class="w-full rounded border px-3 py-2">
      <option value="">Select product</option>
      {% for product in products %}
        <option value="{{ product.id }}">{{ product.name }}</option>
      {% endfor %}
    </select>
    <select name="material_id" required class="w-full rounded border px-3 py-2">
      <option value="">Select material</option>
      {% for material in materials %}
        <option value="{{ material.id }}">{{ material.name }}</option>
      {% endfor %}
    </select>
    <input name="quantity_required" type="number" min="0.01" step="0.01" placeholder="Quantity required per product" required class="w-full rounded border px-3 py-2" />
    <button class="w-full rounded bg-brandFire px-4 py-2 font-semibold text-white hover:bg-brandWine">Save</button>
  </form>

  <div class="lg:col-span-2 space-y-3">
    {% for entry in entries %}
      <article class="rounded bg-white p-4 shadow-sm ring-1 ring-slate-200">
        <h3 class="font-semibold text-brandNight">{{ entry.product.name }}</h3>
        <p class="text-sm text-slate-600">{{ entry.material.name }}: {{ '%.2f'|format(entry.quantity_required) }} {{ entry.material.unit }}</p>
      </article>
    {% else %}
      <p class="rounded bg-white p-4 shadow-sm">No BOM entries yet.</p>
    {% endfor %}
  </div>
</div>
{% endblock %}
