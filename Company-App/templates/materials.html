{% extends 'base.html' %}
{% block content %}
<h1 class="mb-6 text-3xl font-black text-brandNight">Materials</h1>

<div class="grid gap-6 lg:grid-cols-3">
  <form method="post" class="space-y-3 rounded-xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
    <h2 class="text-lg font-bold text-brandDeep">Add Material</h2>
    <input name="name" placeholder="Material name" required class="w-full rounded border px-3 py-2" />
    <input name="unit" placeholder="Unit (kg, l, pcs)" required class="w-full rounded border px-3 py-2" />
    <input name="current_stock" type="number" min="0" step="0.01" placeholder="Current stock" class="w-full rounded border px-3 py-2" />
    <button class="w-full rounded bg-brandFire px-4 py-2 font-semibold text-white hover:bg-brandWine">Save</button>
  </form>

  <div class="lg:col-span-2 space-y-3">
    {% for material in materials %}
      <article class="rounded bg-white p-4 shadow-sm ring-1 ring-slate-200">
        <div class="flex items-center justify-between gap-3">
          <h3 class="font-bold text-brandNight">{{ material.name }}</h3>
          <span class="text-sm text-brandWine">{{ '%.2f'|format(material.current_stock) }} {{ material.unit }}</span>
        </div>
      </article>
    {% else %}
      <p class="rounded bg-white p-4 shadow-sm">No materials yet.</p>
    {% endfor %}
  </div>
</div>
{% endblock %}
